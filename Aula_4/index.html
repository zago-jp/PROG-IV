<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yami Hunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hud">
        <h1>Yami Hunt</h1>
        <p>Encontre o Yami e clique para marcar pontos.</p>

        <div class="painel">
            <div class="score-box">
                Pontos: <span id="pontos">0</span>
            </div>

            <button id="botao-start">Start</button>
        </div>
    </div>

    <main id="area-jogo" class="area-jogo">
        <img id="yami" src="assents/mask_yami.png" alt="Mask Yami">
    </main>

    <img id="cursor-espada" src="assents/sword_13.png" alt="Cursor espada">
    <div id="cursor-glow"></div>

    <script src="script.js"></script>
</body>
</html>
