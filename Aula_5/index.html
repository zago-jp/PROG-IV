<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Pokédex</h1>
</header>

<main>
    <div class="controls">
        <input type="text" id="search" placeholder="Buscar por nome ou ID">
        <button onclick="buscarPokemon()">Buscar</button>

        <select id="typeFilter" onchange="filtrarTipo()">
            <option value="">Todos os tipos</option>
        </select>
    </div>

    <div id="pokedex" class="grid"></div>
</main>

<!-- Modal -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span onclick="fecharModal()" class="close">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
